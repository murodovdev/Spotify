[build]
builder = "dockerfile"

[deploy]
restartPolicyType = "always"
healthcheckPath = "/health"
# numReplicas MUST stay 1:
#   (a) the persistent volume attaches to a single instance only;
#   (b) two long-polling instances raise TelegramConflictError.
numReplicas = 1

# ── Persistence (REQUIRED) ───────────────────────────────────────────────────
# Attach a volume at mount path /data (Railway UI → Service → Attach Volume).
# With DB_PATH unset, the app writes to /data/bot.db automatically.
# WITHOUT a volume, every redeploy wipes all user data.
